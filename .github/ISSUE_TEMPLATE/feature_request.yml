name: Feature request
description: Suggest an idea or improvement for ContribOS
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Share your idea. The more context you provide, the easier it is to evaluate and plan.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What problem are you solving, or what capability do you want?
      placeholder: As a user, I want to ...
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
      description: How you imagine this working (UX, APIs, CLI flags, etc.).
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you prefer this one (or trade-offs).
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to related issues, prior art, mockups, or constraints.
    validations:
      required: false
