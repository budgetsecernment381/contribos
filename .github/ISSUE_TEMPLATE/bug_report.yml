name: Bug report
description: Report something that is not working as expected
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear summary of the problem.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: How can we reproduce the issue? Numbered steps help.
      placeholder: |
        1. Go to '...'
        2. Run '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened (including error messages or stack traces if relevant).
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Versions and platform details.
      value: |
        - OS (e.g. macOS 14, Ubuntu 22.04, Windows 11):
        - Node.js (e.g. 22.12.0):
        - Python (e.g. 3.12.7):
        - Docker / Docker Compose (if used, e.g. 27.x):
        - pnpm (e.g. 9.15.4):
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots (optional)
      description: Drag and drop images or paste links. Redact sensitive data.
    validations:
      required: false
